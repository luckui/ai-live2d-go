<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hiyori - 看板喵</title>
    <!-- Live2D Cubism Core 必须在任何 ES 模块前加载 -->
    <script src="./Core/live2dcubismcore.js"></script>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">

      <!-- ===== Live2D 画布区域（可拖动窗口） ===== -->
      <div id="canvas-container" class="drag-region">
        <canvas id="live2d-canvas"></canvas>
        <!-- 右上角控制按钮（不可拖动） -->
        <div id="canvas-controls" class="no-drag">
          <button id="pin-btn" class="ctrl-btn" title="置顶/取消置顶">📌</button>
        </div>
      </div>

      <!-- ===== 聊天面板 ===== -->
      <div id="chat-panel">

        <!-- 聊天头部（可拖动） -->
        <div id="chat-header" class="drag-region">
          <div class="chat-header-left">
            <span class="chat-avatar">🌸</span>
            <div class="chat-header-info">
              <span class="chat-title">Hiyori</span>
              <span class="chat-status">
                <span class="status-dot"></span><span id="chat-conv-title">在线</span>
              </span>
            </div>
          </div>
          <div class="chat-header-right no-drag">
            <button id="sessions-btn" class="ctrl-btn" title="历史对话">☰</button>
            <button id="new-chat-btn" class="ctrl-btn" title="新建对话">✏</button>
            <button id="settings-btn" class="ctrl-btn" title="LLM 设置">⚙</button>
            <button id="toggle-chat-btn" class="ctrl-btn" title="折叠/展开聊天">
              <span id="toggle-icon">▾</span>
            </button>
            <button id="close-btn" class="ctrl-btn close-ctrl" title="关闭">✕</button>
          </div>
        </div>

        <!-- 聊天主体（可折叠） -->
        <div id="chat-body">

          <!-- 聊天视图 -->
          <div id="chat-view">
            <!-- 消息列表 -->
            <div id="messages-container">
              <div id="messages"></div>
            </div>

            <!-- 输入框区域 -->
            <div id="input-area">
              <input
                type="text"
                id="message-input"
                placeholder="说点什么..."
                autocomplete="off"
                spellcheck="false"
              />
              <button id="send-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
              </button>
            </div>
          </div><!-- /#chat-view -->

          <!-- 对话列表面板（左滑入） -->
          <div id="conv-panel">
            <button id="conv-new-btn">✏ 新建对话</button>
            <div id="conv-list"></div>
          </div><!-- /#conv-panel -->

        </div><!-- /#chat-body -->

      </div><!-- /#chat-panel -->

            <!-- ===== 设置面板（从右滑入，全屏覆盖） ===== -->
      <div id="settings-panel">

        <div id="settings-hdr" class="drag-region">
          <button id="settings-back" class="ctrl-btn no-drag">&lsaquo;</button>
          <span class="settings-ttl">设置</span>
        </div>

        <!-- Tab 切换栏 -->
        <div id="s-tabs" class="no-drag">
          <button class="s-tab s-tab-active" data-tab="llm">🤖 AI 模型</button>
          <button class="s-tab" data-tab="tts">🔊 语音</button>
          <button class="s-tab" data-tab="bridges">🔗 平台桥接</button>
        </div>

        <div id="settings-scroller">

          <!-- ════ Tab: LLM ════ -->
          <div id="s-tab-llm" class="s-tab-pane">

            <!-- 全局设置 -->
            <section class="s-section">
              <h3 class="s-title">全局</h3>
              <label class="s-label">对话记忆轮数
                <input id="s-rounds" type="number" min="1" max="200" class="s-input" />
                <span class="s-hint">每次请求携带最近 N 轮上下文（1轮 = 1问1答，超出部分仍存数据库）</span>
              </label>
              <label class="s-label">Agent 模式
                <select id="s-agent-mode" class="s-input">
                  <option value="off">关闭（默认）：普通聊天，不自动进入 Agent</option>
                  <option value="force">强制：每条消息都走 Agent 自动规划执行</option>
                </select>
                <span class="s-hint">建议日常用“关闭”，需要全自动时再切到“强制”</span>
              </label>
            </section>

            <!-- 服务商列表 -->
            <section class="s-section">
              <div class="s-section-row">
                <h3 class="s-title">服务商</h3>
                <button id="s-add-btn" class="s-small-btn">+ 新增</button>
              </div>
              <div id="s-provider-pills"></div>
            </section>

            <!-- 服务商表单 -->
            <section class="s-section" id="s-form-section">
              <div class="s-section-row">
                <h3 class="s-title">服务商配置</h3>
                <div class="s-btn-group">
                  <button id="s-set-active-btn" class="s-small-btn">设为当前</button>
                  <button id="s-del-btn" class="s-small-btn s-del-btn">删除</button>
                </div>
              </div>

              <label class="s-label">名称
                <input id="s-name" type="text" class="s-input" placeholder="我的服务商" />
              </label>
              <label class="s-label">Base URL
                <input id="s-baseUrl" type="text" class="s-input" placeholder="https://api.openai.com/v1" />
              </label>
              <label class="s-label">API Key
                <div class="s-input-row">
                  <input id="s-apiKey" type="password" class="s-input" placeholder="sk-…" />
                  <button class="s-eye-btn" id="s-eye-btn">👁</button>
                </div>
              </label>
              <label class="s-label">模型 ID
                <input id="s-model" type="text" class="s-input" placeholder="gpt-4o-mini" />
              </label>
              <div class="s-row-2">
                <label class="s-label">温度
                  <input id="s-temp" type="number" class="s-input" min="0" max="2" step="0.05" />
                </label>
                <label class="s-label">Max Tokens
                  <input id="s-tokens" type="number" class="s-input" min="128" step="128" />
                </label>
              </div>
              <label class="s-label">系统提示词
                <textarea id="s-sysprompt" class="s-textarea" rows="4" placeholder="你是一个…"></textarea>
              </label>
            </section>

            <div class="s-save-row">
              <button id="settings-save-btn" class="s-save-btn">保存设置</button>
            </div>

          </div><!-- /#s-tab-llm -->

          <!-- ════ Tab: 语音合成（TTS） ════ -->
          <div id="s-tab-tts" class="s-tab-pane s-tab-pane-hidden">

            <section class="s-section">
              <h3 class="s-title">基本配置</h3>
              <label class="s-label s-label-row">
                <span class="s-label-text">启用 TTS 语音合成</span>
                <label class="s-toggle">
                  <input type="checkbox" id="tts-enabled" />
                  <span class="s-toggle-slider"></span>
                </label>
              </label>
              <label class="s-label">服务地址
                <input id="tts-url" type="text" class="s-input" placeholder="http://your-tts-server" />
                <span class="s-hint">TTS 服务根地址，不含路径（如 http://8.153.95.187）</span>
              </label>
              <label class="s-label">API Key
                <div class="s-input-row">
                  <input id="tts-apikey" type="password" class="s-input" placeholder="Bearer Token（留空则不发送认证头）" />
                  <button class="s-eye-btn" id="tts-eye-btn">👁</button>
                </div>
              </label>
            </section>

            <section class="s-section">
              <h3 class="s-title">语音参数</h3>
              <div class="s-row-2">
                <label class="s-label">音色
                  <input id="tts-speaker" type="text" class="s-input" placeholder="bailu" />
                  <span class="s-hint">音色 ID，查询服务 /speakers 获取列表</span>
                </label>
                <label class="s-label">语言
                  <select id="tts-language" class="s-input">
                    <option value="Auto">Auto（自动识别）</option>
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                  </select>
                </label>
              </div>
            </section>

            <section class="s-section">
              <h3 class="s-title">运行时状态</h3>
              <div class="s-status-row">
                <span id="tts-runtime-dot" class="s-status-dot s-status-off"></span>
                <span id="tts-runtime-text" class="s-status-label">加载中…</span>
              </div>
              <span class="s-hint">反映主进程当前实际读到的配置。若显示“未启用”，请填写上方表单并点「保存设置」</span>
            </section>

            <section class="s-section">
              <h3 class="s-title">连通性测试</h3>
              <div class="s-test-row">
                <button id="tts-test-btn" class="s-small-btn">🔍 测试连接</button>
                <div class="s-status-row" style="margin:0;padding:0">
                  <span id="tts-status-dot" class="s-status-dot s-status-off"></span>
                  <span id="tts-status-text" class="s-status-label">-</span>
                </div>
              </div>
              <span class="s-hint">测试将对当前填写的服务地址发起 GET /health/ 请求</span>
            </section>

            <div class="s-save-row">
              <button id="tts-save-btn" class="s-save-btn">保存设置</button>
            </div>

          </div><!-- /#s-tab-tts -->

          <!-- ════ Tab: 平台桥接 ════ -->
          <div id="s-tab-bridges" class="s-tab-pane s-tab-pane-hidden">

            <!-- Master-detail 容器 -->
            <div id="s-bridges-layout">

              <!-- 左侧：平台列表 -->
              <ul id="s-bridges-list">
                <li class="s-bridge-item s-bridge-active" data-bridge="discord">
                  <span class="s-bridge-icon">💬</span>
                  <span class="s-bridge-name">Discord</span>
                  <span id="dc-list-dot" class="s-bridge-dot s-status-off"></span>
                </li>
                <!-- 未来在此追加：Telegram、QQ 等 -->
              </ul>

              <!-- 右侧：配置详情 -->
              <div id="s-bridges-detail">

                <!-- ── Discord 配置面板 ── -->
                <div id="s-bridge-discord" class="s-bridge-pane">

                  <section class="s-section">
                    <h3 class="s-title">Bot 连接</h3>
                    <label class="s-label s-label-row">
                      <span class="s-label-text">启用 Discord Bot</span>
                      <label class="s-toggle">
                        <input type="checkbox" id="dc-enabled" />
                        <span class="s-toggle-slider"></span>
                      </label>
                    </label>
                    <label class="s-label">Bot Token
                      <div class="s-input-row">
                        <input id="dc-token" type="password" class="s-input" placeholder="Bot Token（来自 Discord Developer Portal）" />
                        <button class="s-eye-btn" id="dc-eye-btn">👁</button>
                      </div>
                      <span class="s-hint">前往 discord.com/developers/applications 创建 Bot 后复制</span>
                    </label>
                  </section>

                  <section class="s-section">
                    <h3 class="s-title">频道与代理</h3>
                    <label class="s-label">白名单频道 ID
                      <input id="dc-channels" type="text" class="s-input" placeholder="频道ID1,频道ID2（留空=响应所有频道）" />
                      <span class="s-hint">多个 ID 用英文逗号分隔，留空则 Bot 响应所有频道消息</span>
                    </label>
                    <label class="s-label">代理地址（国内必填）
                      <input id="dc-proxy" type="text" class="s-input" placeholder="http://127.0.0.1:7890" />
                      <span class="s-hint">HTTP/HTTPS 代理，用于访问 Discord API（国内环境必须配置）</span>
                    </label>
                  </section>

                  <section class="s-section">
                    <h3 class="s-title">Bot 状态</h3>
                    <div class="s-status-row">
                      <span id="dc-status-dot" class="s-status-dot s-status-off"></span>
                      <span id="dc-status-text">未启动</span>
                    </div>
                  </section>

                  <div class="s-save-row">
                    <button id="dc-save-btn" class="s-save-btn">保存并重启 Bot</button>
                  </div>

                </div><!-- /#s-bridge-discord -->

              </div><!-- /#s-bridges-detail -->
            </div><!-- /#s-bridges-layout -->

          </div><!-- /#s-tab-bridges -->

        </div><!-- /#settings-scroller -->
      </div><!-- /#settings-panel -->

    </div><!-- /#app -->

    <!-- 退出保存遮罩（默认隐藏） -->
    <div id="quit-overlay" aria-live="polite">
      <div class="quit-overlay-box">
        <div class="quit-spinner"></div>
        <p class="quit-title">正在保存记忆…</p>
        <p class="quit-hint">稍等片刻，就好啊 (づ´・ω・)づ</p>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
